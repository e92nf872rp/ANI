apiVersion: v2
name: ani-cluster-foundation
description: ANI isolated cluster foundation (KubeVirt, Rook-Ceph, Harbor). Kube-OVN is not included.
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - ani
  - kubevirt
  - rook-ceph
  - harbor
maintainers:
  - name: KuberCloud ANI
dependencies:
  - name: rook-ceph
    version: v1.20.0
    repository: https://charts.rook.io/release
    condition: rook.enabled
  - name: harbor
    version: 1.19.1
    repository: https://helm.goharbor.io
    condition: harbor.enabled
