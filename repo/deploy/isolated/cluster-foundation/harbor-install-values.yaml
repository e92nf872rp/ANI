# Harbor install values (isolated / changqingyun mirror).
# Requires StorageClass ani-rbd-ssd (Ceph) — installed before Harbor in deploy.py.

expose:
  type: nodePort
  tls:
    enabled: false
  nodePort:
    name: harbor
    ports:
      http:
        port: 80
        nodePort: 30002
      https:
        port: 443
        nodePort: 30003
externalURL: http://harbor.harbor.svc.cluster.local
harborAdminPassword: ani-harbor-admin-dev
updateStrategy:
  type: Recreate
nginx:
  image:
    repository: docker.changqingyun.cn/mirror/goharbor/nginx-photon
    tag: v2.15.1
portal:
  replicas: 1
  image:
    repository: docker.changqingyun.cn/mirror/goharbor/harbor-portal
    tag: v2.15.1
core:
  replicas: 1
  image:
    repository: docker.changqingyun.cn/mirror/goharbor/harbor-core
    tag: v2.15.1
jobservice:
  replicas: 1
  image:
    repository: docker.changqingyun.cn/mirror/goharbor/harbor-jobservice
    tag: v2.15.1
registry:
  replicas: 1
  registry:
    image:
      repository: docker.changqingyun.cn/mirror/goharbor/registry-photon
      tag: v2.15.1
  controller:
    image:
      repository: docker.changqingyun.cn/mirror/goharbor/harbor-registryctl
      tag: v2.15.1
database:
  internal:
    image:
      repository: docker.changqingyun.cn/mirror/goharbor/harbor-db
      tag: v2.15.1
redis:
  internal:
    image:
      repository: docker.changqingyun.cn/mirror/goharbor/redis-photon
      tag: v2.15.1
trivy:
  enabled: true
  image:
    repository: docker.changqingyun.cn/mirror/goharbor/trivy-adapter-photon
    tag: v2.15.1
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      storageClass: ani-rbd-ssd
      size: 20Gi
    jobservice:
      jobLog:
        storageClass: ani-rbd-ssd
        size: 1Gi
    database:
      storageClass: ani-rbd-ssd
      size: 5Gi
    redis:
      storageClass: ani-rbd-ssd
      size: 1Gi
    trivy:
      storageClass: ani-rbd-ssd
      size: 5Gi
notary:
  enabled: false
chartmuseum:
  enabled: false
