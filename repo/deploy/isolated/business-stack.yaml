apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
rules:
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      - "virtualmachines/start"
      - "virtualmachines/stop"
      - "virtualmachines/restart"
      - "virtualmachineinstances/console"
      - "virtualmachineinstances/vnc"
      - "virtualmachineinstances/portforward"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-gateway-core-provider
subjects:
  - kind: ServiceAccount
    name: ani-gateway
    namespace: ani-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-auth-service
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-auth-service
      containers:
        - name: ani-auth-service
          image: docker.changqingyun.cn/ani/ani-auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9101
            - name: health
              containerPort: 9201
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: GRPC_PORT
              value: "9101"
            - name: HEALTH_PORT
              value: "9201"
            - name: AUTH_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: auth_jwt_issuer
            - name: AUTH_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: jwt_public_key_pem
            - name: AUTH_JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: jwt_private_key_pem
            - name: AUTH_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_issuer_url
            - name: AUTH_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_client_id
            - name: AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_client_secret
            - name: AUTH_OIDC_GROUP_ROLE_MAP_JSON
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_group_role_map_json
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  selector:
    app.kubernetes.io/name: ani-auth-service
  ports:
    - name: grpc
      port: 9101
      targetPort: grpc
    - name: health
      port: 9201
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-gateway
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-gateway
      containers:
        - name: ani-gateway
          image: docker.changqingyun.cn/ani/ani-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: ANI_AUTH_MODE
              value: "auth_service"
            - name: AUTH_SERVICE_ADDR
              value: "ani-auth-service.ani-system.svc.cluster.local:9101"
            - name: GATEWAY_HTTP_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ani-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
---
