apiVersion: v1
kind: Namespace
metadata:
  name: ani-tenant-default
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.deploy/profile: isolated
    ani.kubercloud.io/tenant-name: default
---
apiVersion: v1
kind: Namespace
metadata:
  name: ani-tenant-tenant-a
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.deploy/profile: isolated
    ani.kubercloud.io/tenant-name: tenant-a
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "secrets", "pods", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubeovn.io"]
    resources: ["vpcs", "subnets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      - "virtualmachines/start"
      - "virtualmachines/stop"
      - "virtualmachines/restart"
      - "virtualmachineinstances/console"
      - "virtualmachineinstances/vnc"
      - "virtualmachineinstances/portforward"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-gateway-core-provider
subjects:
  - kind: ServiceAccount
    name: ani-gateway
    namespace: ani-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-auth-service
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-auth-service
      containers:
        - name: ani-auth-service
          image: docker.changqingyun.cn/ani/ani-auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9101
            - name: health
              containerPort: 9201
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: GRPC_PORT
              value: "9101"
            - name: HEALTH_PORT
              value: "9201"
            - name: AUTH_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: auth_jwt_issuer
            - name: AUTH_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: jwt_public_key_pem
            - name: AUTH_JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: jwt_private_key_pem
            - name: AUTH_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_issuer_url
            - name: AUTH_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_client_id
            - name: AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_client_secret
            - name: AUTH_OIDC_GROUP_ROLE_MAP_JSON
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: oidc_group_role_map_json
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  selector:
    app.kubernetes.io/name: ani-auth-service
  ports:
    - name: grpc
      port: 9101
      targetPort: grpc
    - name: health
      port: 9201
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-gateway
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-gateway
      containers:
        - name: ani-gateway
          image: docker.changqingyun.cn/ani/ani-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: ANI_AUTH_MODE
              value: "auth_service"
            - name: AUTH_SERVICE_ADDR
              value: "ani-auth-service.ani-system.svc.cluster.local:9101"
            - name: GATEWAY_HTTP_ADDR
              value: ":8080"
            - name: KUBERNETES_PROVIDER_FIELD_MANAGER
              value: "ani-isolated-gateway"
            - name: WORKLOAD_PROVIDER
              value: "kubernetes_rest"
            - name: WORKLOAD_PROVIDER_APPLY_ENABLED
              value: "true"
            - name: WORKLOAD_LIFECYCLE_PROVIDER
              value: "kubernetes_rest"
            - name: WORKLOAD_LIFECYCLE_APPLY_ENABLED
              value: "true"
            - name: WORKLOAD_OPS_PROVIDER
              value: "kubernetes_rest"
            - name: WORKLOAD_OPS_ENABLED
              value: "true"
            - name: INSTANCE_OBSERVABILITY_PROVIDER
              value: "prometheus_kubernetes"
            - name: INSTANCE_OBSERVABILITY_PROMETHEUS_URL
              value: "http://prometheus.ani-system.svc.cluster.local:9090"
            - name: INSTANCE_OBSERVABILITY_EXEC_BASE_URL
              value: "http://192.168.102.75:30080"
            - name: NETWORK_PROVIDER
              value: "kubeovn_rest"
            - name: NETWORK_PROVIDER_APPLY_ENABLED
              value: "true"
            - name: NETWORK_PROVIDER_USER_ID
              value: "ani-core-network-provider"
            - name: NETWORK_PROVIDER_PERMISSION_PROOF
              value: "rbac-scope:networks.write"
            - name: STORAGE_PROVIDER
              value: "kubernetes_rest"
            - name: STORAGE_PROVIDER_APPLY_ENABLED
              value: "true"
            - name: STORAGE_PROVIDER_USER_ID
              value: "ani-core-storage-provider"
            - name: STORAGE_PROVIDER_PERMISSION_PROOF
              value: "rbac-scope:storage.write"
            - name: OBJECT_STORE_PROVIDER
              value: "minio"
            - name: OBJECT_STORE_ENDPOINT
              value: "http://ani-s05-minio.ani-system.svc.cluster.local:9000"
            - name: OBJECT_STORE_PUBLIC_ENDPOINT
              value: "http://192.168.102.75:30900"
            - name: OBJECT_STORE_ACCESS_KEY_ID
              value: "ani-minio-access"
            - name: OBJECT_STORE_SECRET_ACCESS_KEY
              value: "ani-minio-secret"
            - name: OBJECT_STORE_REGION
              value: "us-east-1"
            - name: OBJECT_STORE_SECURE
              value: "false"
            - name: VECTOR_STORE_PROVIDER
              value: "milvus"
            - name: VECTOR_STORE_ENDPOINT
              value: "milvus.ani-system.svc.cluster.local:19530"
            - name: VECTOR_STORE_DATABASE
              value: "default"
            - name: REGISTRY_PROVIDER
              value: "harbor"
            - name: REGISTRY_ENDPOINT
              value: "http://harbor.harbor.svc.cluster.local"
            - name: REGISTRY_USERNAME
              value: "admin"
            - name: REGISTRY_PASSWORD
              value: "ani-harbor-admin-dev"
            - name: REGISTRY_SECURE
              value: "false"
            - name: REGISTRY_TLS_INSECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ani-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
