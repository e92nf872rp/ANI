apiVersion: v1
kind: Namespace
metadata:
  name: ani-system
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: Secret
metadata:
  name: ani-postgres-secret
  namespace: ani-system
  labels:
    ani.deploy/profile: isolated
type: Opaque
stringData:
  POSTGRES_USER: ani
  POSTGRES_PASSWORD: ani_dev_password
  POSTGRES_DB: ani
---
apiVersion: v1
kind: Secret
metadata:
  name: ani-redis-secret
  namespace: ani-system
  labels:
    ani.deploy/profile: isolated
type: Opaque
stringData:
  password: ani_dev_password
---
apiVersion: v1
kind: Service
metadata:
  name: ani-postgres
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-postgres
    ani.deploy/profile: isolated
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: ani-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ani-postgres
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-postgres
    ani.deploy/profile: isolated
spec:
  serviceName: ani-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-postgres
        ani.deploy/profile: isolated
    spec:
      securityContext:
        fsGroup: 26
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: volume-permissions
          image: docker.changqingyun.cn/mirror/busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 26:26 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: docker.changqingyun.cn/mirror/cloudnative-pg/postgresql:15.5-1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 26
            runAsGroup: 26
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-ec", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ani-rbd-ssd
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-redis
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-redis
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-redis
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: redis
          image: docker.changqingyun.cn/mirror/redis:8.2.3-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - exec redis-server --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-redis-secret
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-redis
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-redis
    ani.deploy/profile: isolated
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: ani-redis
---
