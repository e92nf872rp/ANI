apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: ani-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: milvus
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: milvus
          image: docker.changqingyun.cn/mirror/milvusdb/milvus:v2.4.15
          imagePullPolicy: IfNotPresent
          command:
            - milvus
            - run
            - standalone
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd.ani-system.svc.cluster.local:2379
            - name: MINIO_ADDRESS
              value: milvus-minio.ani-system.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: milvus-minio
                  key: access_key
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: milvus-minio
                  key: secret_key
            - name: COMMON_STORAGETYPE
              value: minio
          ports:
            - name: grpc-rest
              containerPort: 19530
            - name: metrics
              containerPort: 9091
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: ani-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: milvus
  ports:
    - name: grpc-rest
      port: 19530
      targetPort: grpc-rest
      nodePort: 31930
    - name: metrics
      port: 9091
      targetPort: metrics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: ani-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ani-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['127.0.0.1:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ani-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: docker.changqingyun.cn/mirror/prom/prometheus:v2.39.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ani-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 31990
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-dex-config
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-dex
    ani.deploy/profile: isolated
data:
  config.yaml: |
    issuer: http://console.example.local:30081/dex

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true

    staticClients:
      - id: ani-console
        name: ANI Console
        secret: $ANI_DEX_CLIENT_SECRET
        redirectURIs:
          - http://ani-gateway.ani-system.svc.cluster.local:8080/auth/callback
          - http://ani-gateway.ani-system.svc.cluster.local:8080/api/v1/auth/callback
          - http://127.0.0.1:30080/auth/callback
          - http://127.0.0.1:30080/api/v1/auth/callback
          - http://localhost:30080/auth/callback
          - http://localhost:30080/api/v1/auth/callback
          - http://console.example.local:30081/login/callback

    enablePasswordDB: true

    staticPasswords:
      - email: admin@ani.local
        hash: "$2a$10$wbTiEfZUu5O8uxm9JRXPyeqXKtC5VD0DY7igdDLV7Wyq4.MfZSara"
        username: admin
        userID: "11111111-1111-1111-1111-111111111111"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-dex
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-dex
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-dex
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: dex
          image: docker.changqingyun.cn/mirror/dexidp/dex:v2.40.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              SECRET="${ANI_DEX_CLIENT_SECRET:-ani-dex-client-secret-dev}"
              sed "s|\$ANI_DEX_CLIENT_SECRET|${SECRET}|g" /etc/dex/config.yaml > /tmp/dex-config.yaml
              exec dex serve /tmp/dex-config.yaml
          env:
            - name: ANI_DEX_CLIENT_SECRET
              value: ani-dex-client-secret-dev
          ports:
            - name: http
              containerPort: 5556
          volumeMounts:
            - name: dex-config
              mountPath: /etc/dex
              readOnly: true
          readinessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: dex-config
          configMap:
            name: ani-dex-config
---
apiVersion: v1
kind: Service
metadata:
  name: ani-dex
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-dex
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ani-dex
  ports:
    - name: http
      port: 5556
      targetPort: http
      nodePort: 30556
