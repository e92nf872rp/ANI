apiVersion: v1
kind: Secret
metadata:
  name: ani-s05-minio-root
  namespace: ani-system
  labels:
    ani.deploy/profile: isolated
type: Opaque
stringData:
  access_key_id: ani-minio-access
  secret_access_key: ani-minio-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-s05-minio
  namespace: ani-system
  labels:
    app.kubernetes.io/name: minio
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: minio
          image: docker.changqingyun.cn/mirror/minio/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --address
            - :9000
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: access_key_id
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: secret_access_key
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ani-s05-minio
  namespace: ani-system
  labels:
    app.kubernetes.io/name: minio
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: v1
kind: Secret
metadata:
  name: milvus-minio
  namespace: ani-system
  labels:
    ani.deploy/profile: isolated
type: Opaque
stringData:
  access_key: ani-milvus-access
  secret_key: ani-milvus-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: ani-system
  labels:
    app.kubernetes.io/name: milvus-etcd
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus-etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: milvus-etcd
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: etcd
          image: docker.changqingyun.cn/mirror/coreos/etcd:v3.5.5
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              exec etcd \
                --advertise-client-urls="http://${POD_IP}:2379" \
                --listen-client-urls="http://${POD_IP}:2379,http://localhost:2379" \
                --data-dir=/etcd
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: client
              containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: ani-system
spec:
  selector:
    app.kubernetes.io/name: milvus-etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
